<aside class="sidebar">
    <!-- Header khusus untuk sidebar popup di detail-page -->
    <div class="sidebar-popup-header" style="display: none; align-items: center; padding: 16px 24px 16px 16px; margin-bottom: 12px; height: 64px; box-sizing: border-box;">
        <button onclick="document.body.classList.remove('sidebar-expanded')" style="background: none; border: none; cursor: pointer; padding: 8px; margin-right: 21px; display: flex; align-items: center; justify-content: center; color: var(--color-text); border-radius: 50%; transition: background 0.2s;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </button>
        <a href="{% url 'core:dashboard' %}" style="display: flex; align-items: center; gap: 8px; text-decoration: none;">
            <div style="background-color: var(--color-accent); width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
                    <polyline points="2 17 12 22 22 17"></polyline>
                    <polyline points="2 12 12 17 22 12"></polyline>
                </svg>
            </div>
            <span style="font-size: 24px; font-weight: 500; color: var(--color-text); letter-spacing: -1px; line-height: 1;">CoreIE</span>
        </a>
    </div>
    <a href="{% url 'core:dashboard' %}" class="sidebar-item {% if request.path == '/dashboard/' or request.path == '/' %}active{% endif %}">
        <div class="sidebar-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
        </div>
        <span class="sidebar-label">Beranda</span>
        <span class="sidebar-mini-label">Beranda</span>
    </a>
    
    <a href="{% url 'core:projects_list' %}" class="sidebar-item {% if '/projects/' in request.path %}active{% endif %}">
        <div class="sidebar-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="7" height="7"></rect>
                <rect x="14" y="3" width="7" height="7"></rect>
                <rect x="14" y="14" width="7" height="7"></rect>
                <rect x="3" y="14" width="7" height="7"></rect>
            </svg>
        </div>
        <span class="sidebar-label">Proyek</span>
        <span class="sidebar-mini-label">Proyek</span>
    </a>
    
    <a href="{% url 'core:blueprints_list' %}" class="sidebar-item {% if '/blueprints/' in request.path %}active{% endif %}">
        <div class="sidebar-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
                <polyline points="2 17 12 22 22 17"></polyline>
                <polyline points="2 12 12 17 22 12"></polyline>
            </svg>
        </div>
        <span class="sidebar-label">Blueprint Proyek</span>
        <span class="sidebar-mini-label">Blueprint</span>
    </a>
    
    <a href="{% url 'core:reports' %}" class="sidebar-item {% if '/reports/' in request.path %}active{% endif %}">
        <div class="sidebar-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
                <polyline points="10 9 9 9 8 9"></polyline>
            </svg>
        </div>
        <span class="sidebar-label">Laporan</span>
        <span class="sidebar-mini-label">Laporan</span>
    </a>
    
    <div class="sidebar-bottom-item" style="height: 1px; background: var(--color-border); margin: 12px 16px;"></div>
    
    <a href="{% url 'core:settings' %}" class="sidebar-item sidebar-bottom-item {% if '/settings/' in request.path %}active{% endif %}">
        <div class="sidebar-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
            </svg>
        </div>
        <span class="sidebar-label">Web Settings</span>
    </a>
    
    <a href="{% url 'core:profile' %}" class="sidebar-item sidebar-bottom-item {% if '/profile/' in request.path %}active{% endif %}">
        <div class="sidebar-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
            </svg>
        </div>
        <span class="sidebar-label">Profile Settings</span>
    </a>
    
    <a href="{% url 'core:profile' %}" class="sidebar-profile-item" style="padding: 0 16px 16px 16px; display: flex; align-items: center; gap: 12px; margin-top: auto; text-decoration: none; transition: all 0.2s;">
        {% if user.profile.avatar %}
            <img src="{{ user.profile.avatar.url }}" alt="Profile" style="width: 36px; height: 36px; border-radius: 50%; object-fit: cover; flex-shrink: 0;">
        {% else %}
            <div style="width: 36px; height: 36px; border-radius: 50%; background: var(--color-accent); color: white; display: flex; align-items: center; justify-content: center; font-weight: 600; flex-shrink: 0;">
                {{ user.username|make_list|first|upper }}
            </div>
        {% endif %}
        <div class="profile-text" style="display: flex; flex-direction: column; overflow: hidden; width: 100%;">
            <span style="font-weight: 600; font-size: 14px; color: var(--color-text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">{{ user.get_full_name|default:user.username }}</span>
            <span style="font-size: 12px; color: var(--color-gray); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">{{ user.email }}</span>
        </div>
    </a>

    <style>
        body:not(.sidebar-expanded) .sidebar-bottom-item {
            display: none !important;
        }
        body:not(.sidebar-expanded) .sidebar-profile-item {
            justify-content: center !important;
            padding: 16px 0 !important;
            gap: 0 !important;
        }
        body:not(.sidebar-expanded) .sidebar-profile-item .profile-text {
            display: none !important;
            width: 0 !important;
        }
    </style>
</aside>
